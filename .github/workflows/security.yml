name: Security

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # required for CodeQL to upload results

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run npm audit
      run: npm audit --audit-level=moderate
      continue-on-error: true

    # Secret scanning is handled by the dedicated `gitleaks` job below
    # (replaces the previous trufflehog step, which failed on push when
    # BASE == HEAD).

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: javascript-typescript

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3

    - name: Check dependencies (informational)
      run: |
        npx npm-check-updates || true
        npx depcheck || true
      continue-on-error: true

  gitleaks:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # full history so the whole repo is scanned, not just the diff

    - name: Run gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITLEAKS_CONFIG: .gitleaks.toml  # same rules as the local pre-commit hook